<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MathAI — Doubt Solver</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <!-- mathjs for client-side verification -->
  <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --surface3: #252532;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6ff7;
    --accent2: #a89cf7;
    --accent-glow: rgba(124,111,247,0.18);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.1);
    --text: #f0eff8;
    --text2: #9896b0;
    --text3: #5c5a78;
    --red: #f06b6b;
    --red-bg: rgba(240,107,107,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    min-height: 100vh;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #7c6ff7, #a89cf7);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(124,111,247,0.3);
  }

  .logo-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-text p {
    font-size: 12px;
    color: var(--text3);
    margin-top: -1px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .streak-badge {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: var(--surface);
    font-family: var(--mono);
  }

  /* Main layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 1.25rem;
    flex: 1;
  }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }

  .input-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 10px;
    font-weight: 500;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text3);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover { border-color: var(--border2); color: var(--text2); }

  .chip.active {
    background: rgba(124,111,247,0.15);
    border-color: rgba(124,111,247,0.4);
    color: var(--accent2);
  }

  .solve-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(124,111,247,0.25);
  }

  .solve-btn:hover { opacity: 0.9; }
  .solve-btn:active { transform: scale(0.97); }
  .solve-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* Solution area */
  .solution-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    flex: 1;
    min-height: 260px;
    transition: border-color 0.3s;
  }

  .solution-area.active { border-color: rgba(124,111,247,0.25); }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    gap: 10px;
    color: var(--text3);
  }

  .placeholder-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .placeholder p { font-size: 14px; text-align: center; max-width: 260px; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; gap: 6px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* Solution content */
  .sol-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .sol-title {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
  }

  .topic-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(124,111,247,0.15);
    color: var(--accent2);
    border: 1px solid rgba(124,111,247,0.25);
    font-family: var(--mono);
  }

  .steps { display: flex; flex-direction: column; gap: 14px; }

  .step {
    display: flex;
    gap: 12px;
    animation: fadeSlide 0.3s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step:nth-child(1) { animation-delay: 0.05s; }
  .step:nth-child(2) { animation-delay: 0.1s; }
  .step:nth-child(3) { animation-delay: 0.15s; }
  .step:nth-child(4) { animation-delay: 0.2s; }
  .step:nth-child(5) { animation-delay: 0.25s; }

  .step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1px solid var(--border2);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .step-body { flex: 1; }
  .step-title-text { font-weight: 500; color: var(--text); font-size: 14px; }
  .step-explanation { font-size: 14px; color: var(--text2); margin-top: 2px; line-height: 1.65; }

  .math-expr {
    display: inline-block;
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface3);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 5px;
    border: 1px solid var(--border);
    letter-spacing: 0.3px;
  }

  .answer-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--green-bg);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(62,207,142,0.2);
    animation: fadeSlide 0.3s ease 0.3s both;
  }

  .answer-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .answer-value {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--green);
  }

  .tip-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--amber-bg);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(245,166,35,0.2);
    font-size: 13px;
    color: var(--amber);
    animation: fadeSlide 0.3s ease 0.35s both;
  }

  .err-box {
    padding: 12px 16px;
    background: var(--red-bg);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(240,107,107,0.25);
    font-size: 13px;
    color: var(--red);
    font-family: var(--mono);
  }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 0.75rem; }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    line-height: 1;
  }

  .side-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .side-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .empty-state { font-size: 12px; color: var(--text3); }

  .prog-item { margin-bottom: 10px; }
  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
  }

  .prog-count { font-family: var(--mono); color: var(--text3); font-size: 11px; }

  .prog-track {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .hist-item {
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .hist-item:last-child { border-bottom: none; }
  .hist-item:hover { opacity: 0.7; }

  .hist-q {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hist-topic {
    font-size: 10px;
    color: var(--accent);
    font-family: var(--mono);
    margin-top: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-mark">∑</div>
    <div class="logo-text">
      <h1>MathAI</h1>
      <p>Step-by-step doubt solver</p>
    </div>
    <div class="header-right">
      <span class="streak-badge" id="streak">0 solved</span>
    </div>
  </header>

  <div class="layout">
    <div class="main-panel" style="display:flex;flex-direction:column;gap:0.75rem;">

      <div class="input-card">
        <div class="input-label">Your doubt</div>
        <textarea id="q" placeholder="e.g.  Solve 2x² + 5x - 3 = 0&#10;       Find the derivative of sin(x) · x²&#10;       Area of a triangle with base 8 cm, height 5 cm"></textarea>
        <p class="hint">Tip: Press Ctrl + Enter to solve quickly</p>
        <div class="row-between">
          <div class="chips" id="chips">
            <button class="chip active" data-t="Algebra">Algebra</button>
            <button class="chip" data-t="Calculus">Calculus</button>
            <button class="chip" data-t="Geometry">Geometry</button>
            <button class="chip" data-t="Arithmetic">Arithmetic</button>
            <button class="chip" data-t="Trigonometry">Trigonometry</button>
          </div>
          <button class="solve-btn" id="solve-btn" onclick="solve()">
            <span>Solve</span>
            <span style="font-size:16px;">→</span>
          </button>
        </div>
      </div>

      <div class="solution-area" id="sol-area">
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">📐</div>
          <p>Type any math problem above and get a clear step-by-step solution.</p>
        </div>
      </div>

    </div>

    <div class="sidebar">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Solved</div>
          <div class="stat-value" id="s-solved">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Topics</div>
          <div class="stat-value" id="s-topics">0</div>
        </div>
      </div>

      <div class="side-card">
        <h3>Topic progress</h3>
        <div id="progress-bars">
          <div class="empty-state">Solve problems to see your progress here.</div>
        </div>
      </div>

      <div class="side-card" style="flex:1;overflow-y:auto;max-height:220px;">
        <h3>Recent doubts</h3>
        <div id="history">
          <div class="empty-state">No history yet.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const TOPIC_COLORS = {
    Algebra: '#7c6ff7',
    Calculus: '#3ecf8e',
    Geometry: '#f06b6b',
    Arithmetic: '#f5a623',
    Trigonometry: '#a78bfa'
  };

  let activeTopic = 'Algebra';
  let solvedCount = 0;
  let topicCounts = {};
  let history = [];

  // --- Persistence: load saved stats/history from localStorage ---
  const saved = JSON.parse(localStorage.getItem('mathai_state') || 'null');
  if (saved) {
    solvedCount = saved.solvedCount || solvedCount;
    topicCounts = saved.topicCounts || topicCounts;
    history = saved.history || history;
    document.getElementById('s-solved').textContent = solvedCount;
    document.getElementById('s-topics').textContent = Object.keys(topicCounts).length;
    document.getElementById('streak').textContent = solvedCount + ' solved';
    renderProgress();
    renderHistory();
  }

  function persistState(){
    localStorage.setItem('mathai_state', JSON.stringify({ solvedCount, topicCounts, history }));
  }

  // Frontend no longer holds API keys. Requests are proxied to the server at /solve.

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeTopic = chip.dataset.t;
    });
  });

  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) solve();
  });

  async function solve() {
    const q = document.getElementById('q').value.trim();
    if (!q || q.length > 500) return;

    const btn = document.getElementById('solve-btn');
    const area = document.getElementById('sol-area');

    btn.disabled = true;
    document.getElementById('q').disabled = true;

    area.classList.add('active');
    area.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    try {
      const res = await fetch('http://localhost:5000/solve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          topic: activeTopic,
          question: q
        })
      });

      // Parse JSON response, but be defensive in case server sent non-JSON text
      let data;
      try {
        data = await res.json();
      } catch (_) {
        const t = await res.text();
        throw new Error('Invalid JSON response from server: ' + t);
      }

      if (data.error) {
        const msg = typeof data.error === 'string' ? data.error : JSON.stringify(data.error);
        throw new Error(msg);
      }

      const raw = (data.content?.map?.(b => b.text || '').join('') ?? '')
        .replace(/```json|```/g, '')
        .trim();

      let p;
      try {
        p = JSON.parse(raw);
      } catch {
        throw new Error("Invalid AI response format");
      }

      // Use validation info from server if provided
      const validation = data._validation || null;
          // If server did not provide validation, run a lightweight client-side check
          const clientValidation = (function(){
            try {
              const reported = p.answer;
              const reportedNum = Number(String(reported).replace(/[^0-9eE.+-]/g,''));
              let calc = p.calculation || document.getElementById('q').value || '';
              calc = String(calc).trim();
              if (!calc) return null;
              // convert sin90 -> sin(90 deg)
              calc = calc.replace(/\b(sin|cos|tan)\s*\(?\s*([0-9.]+)\s*\)?/gi, (m, fn, num) => `${fn}(${num} deg)`);
              const expected = math.evaluate(calc);
              const expectedNum = Number(String(expected).replace(/[^0-9eE.+-]/g,''));
              if (!isFinite(expectedNum) || !isFinite(reportedNum)) return null;
              const diff = Math.abs(expectedNum - reportedNum);
              return { valid: diff < 1e-6, expected: expectedNum, reported: reportedNum, diff };
            } catch(e){ return null; }
          })();
          const effectiveValidation = validation || clientValidation || null;

      if (!p.steps || !Array.isArray(p.steps)) {
        throw new Error("Invalid steps data");
      }

      // Update stats
      solvedCount++;
      const topic = p.topic || activeTopic;
      topicCounts[topic] = (topicCounts[topic] || 0) + 1;

      history.unshift({ q: q.length > 46 ? q.slice(0, 46) + '…' : q, topic });
      if (history.length > 10) history.pop();

      document.getElementById('s-solved').textContent = solvedCount;
      document.getElementById('s-topics').textContent = Object.keys(topicCounts).length;
      document.getElementById('streak').textContent = solvedCount + ' solved';

      renderProgress();
      renderHistory();

      // Render solution
      let html = `
      <div class="sol-header">
        <span class="sol-title">Solution</span>
        <span class="topic-badge">${topic}</span>
      </div>
      <div class="steps">
    `;

      p.steps.forEach((s, i) => {
        html += `
        <div class="step">
          <div class="step-num">${i + 1}</div>
          <div class="step-body">
            <div class="step-title-text">${s.title}</div>
            <div class="step-explanation">${s.explanation}</div>
            ${s.math ? `<div class="math-expr">${s.math}</div>` : ''}
          </div>
        </div>
      `;
      });

      html += `</div>
      <div class="answer-box">
        <div class="answer-label">Final Answer</div>
        <div class="answer-value">${p.answer}</div>
      </div>`;

      // action buttons
      html += `<div style="margin-top:10px;display:flex;gap:8px;"><button id="copy-answer" class="solve-btn" style="padding:8px 12px;font-size:13px;">Copy Answer</button><button id="share-link" class="solve-btn" style="padding:8px 12px;font-size:13px;background:var(--surface2);color:var(--text2);">Share</button></div>`;

      if (p.tip) {
        html += `<div class="tip-box">💡 ${p.tip}</div>`;
      }

      // If validation info exists, show a small badge above the steps
      if (effectiveValidation) {
        let vmsg = '';
        if (effectiveValidation.valid === true) vmsg = `<div style="margin-bottom:10px;color:var(--green);font-weight:600;">Validated ✔ (expected ${effectiveValidation.expected})</div>`;
        else if (effectiveValidation.valid === false) vmsg = `<div style="margin-bottom:10px;color:var(--red);font-weight:600;">Validation failed — expected ${effectiveValidation.expected}, got ${effectiveValidation.reported}</div>`;
        else vmsg = `<div style="margin-bottom:10px;color:var(--text3);">Validation: ${effectiveValidation.reason || 'unknown'}</div>`;
        area.innerHTML = vmsg + html;
      } else {
        area.innerHTML = html;
      }

      // render math expressions using KaTeX (if loaded) and wire action buttons
      setTimeout(() => {
        document.querySelectorAll('.math-expr').forEach(el => {
          try {
            if (window.katex) {
              katex.render(el.textContent, el, { throwOnError: false });
            }
          } catch (e) { /* ignore */ }
        });

        // add copy/share buttons behavior if present
        const copyBtn = document.getElementById('copy-answer');
        if (copyBtn) copyBtn.addEventListener('click', () => {
          const val = p.answer || '';
          navigator.clipboard?.writeText(val).then(()=>{ copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy Answer',1200); });
        });

        const shareBtn = document.getElementById('share-link');
        if (shareBtn) shareBtn.addEventListener('click', () => {
          const u = new URL(window.location.href);
          u.searchParams.set('topic', topic);
          u.searchParams.set('q', document.getElementById('q').value);
          navigator.clipboard?.writeText(u.toString()).then(()=>{ shareBtn.textContent='Link Copied'; setTimeout(()=>shareBtn.textContent='Share',1200); });
        });
      }, 40);

    } catch (err) {
      const msg = err && err.message ? err.message : (typeof err === 'string' ? err : JSON.stringify(err));
      area.innerHTML = `<div class="err-box">Error: ${msg}</div>`;
    }

    btn.disabled = false;
    document.getElementById('q').disabled = false;
  }

  function renderProgress() {
    const max = Math.max(...Object.values(topicCounts), 1);
    const html = Object.entries(topicCounts).map(([t, c]) => {
      const color = TOPIC_COLORS[t] || '#7c6ff7';
      const pct = Math.round((c / max) * 100);
      return `<div class="prog-item">
        <div class="prog-row">
          <span>${t}</span>
          <span class="prog-count">${c} solved</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('progress-bars').innerHTML = html || '<div class="empty-state">No data yet.</div>';
  }

  function renderHistory() {
    if (!history.length) {
      document.getElementById('history').innerHTML = '<div class="empty-state">No history yet.</div>';
      return;
    }
    document.getElementById('history').innerHTML = history.map(h =>
      `<div class="hist-item" onclick="loadFromHistory('${h.q.replace(/'/g, "\\'")}', '${h.topic}')">
        <div class="hist-q">${h.q}</div>
        <div class="hist-topic">${h.topic}</div>
      </div>`
    ).join('');
  }

  function loadFromHistory(q, topic) {
    document.getElementById('q').value = q;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.t === topic);
    });
    activeTopic = topic;
  }

  // If URL contains q/topic, prefill inputs
  (function hydrateFromUrl(){
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    const t = params.get('topic');
    if (q) document.getElementById('q').value = q;
    if (t) {
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.t === t));
      activeTopic = t;
    }
  })();
</script>
</body>
</html>
